<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active & Attractive — Urban Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───── CANVAS (3D background) ───── -->
  <canvas id="bg-canvas"></canvas>

  <!-- ───── NAV ───── -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="#" class="logo">
        <img src="assets/logo-monogram.png" alt="Active &amp; Attractive" class="logo-img" />
      </a>
    </div>
  </nav>

  <!-- ───── HERO (centered spinning 3D logo) ───── -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <div class="hero-logo-wrap reveal-up" data-delay="0.05">
        <canvas id="hero-logo-canvas"></canvas>
        <img src="assets/hero-logo-3d.png" alt="Active &amp; Attractive" class="hero-logo-fallback" />
      </div>
      <p class="hero-sub reveal-up" data-delay="0.2">
        Premium urban clothing — coming soon.
      </p>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
